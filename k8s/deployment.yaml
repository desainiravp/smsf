apiVersion: apps/v1
kind: Deployment
metadata:
  name: smsf-app
  namespace: smsf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smsf-app
  template:
    metadata:
      labels:
        app: smsf-app
    spec:
      containers:
      - name: smsf-app
        image: nirav1611/smsf-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000

        env:
        - name: DB_HOST
          value: postgres       # 🔥 must match service name
        - name: DB_NAME
          value: smsf
        - name: DB_USER
          value: postgres
        - name: DB_PASS
          value: postgres
